# TheatriaOnboarding configuration

# Money needed for the first Lands claim. Completing the EARN task requires the
# player's balance to reach this (checked via Vault).
earn-target: 1000.0

# DAILY (daily reward) task detection:
#   Primary  -> TheatriaSessions' SessionsAPI (the player has actually earned today's
#               reward: active, non-AFK playtime past its configured threshold, reset
#               daily). Used automatically whenever TheatriaSessions is installed.
#   Fallback -> when TheatriaSessions is absent, approximate from vanilla playtime:
#               complete after this many minutes of (lifetime, AFK-inclusive) playtime.
daily-minutes: 30

# RTP completes when the player first leaves spawn — the portal teleport, or any
# teleport that changes world or moves at least this many blocks. They can keep
# using /rtp afterwards to find a nicer spot.
rtp-min-distance: 100.0

# Join-time rank check (LuckPerms). A player whose LuckPerms primary group is NOT
# one of these is treated as already ranked up, completing RANKUP retroactively
# (e.g. they ranked up while this plugin was off). Set this to your first/starting
# rank group name(s) — usually the first rank in Rankup's rankups.yml. Leave empty
# ([]) to rely only on the live rank-up event. IMPORTANT: if your starting rank
# group isn't "default", change this, or RANKUP may complete for everyone.
rankup-starting-groups: [default]

# Open the Starter Guide automatically the first time a player ever joins.
auto-open-first-join: true

# Task detection:
#   SETHOME -> confirmed via the Essentials API (player actually has a home).
#   CLAIM   -> confirmed via the Lands API (player actually owns a claim).
#   RANKUP  -> confirmed via the Rankup PlayerRankupEvent (actual rank-up).
# The command lists below are only used as fallbacks when those plugins/hooks
# are unavailable. The EARN sell-fallback applies only when Vault is missing.
# Matching is case-insensitive; multi-word entries like "rank up" match "/rank up ...".
commands:
  sethome: [sethome, createhome]
  claim: [claim, "lands claim"]
  rankup: [rankup, "rank up"]
  # Used as the EARN fallback only when Vault is not installed.
  sell: [sell, "sell hand"]
