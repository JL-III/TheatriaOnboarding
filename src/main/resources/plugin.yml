name: TheatriaOnboarding
version: '${project.version}'
main: com.theatria.onboarding.TheatriaOnboarding
description: Guided new-player onboarding with a dynamic virtual Starter Guide book.
authors: [Theatria]

# Must be a value your server recognises. If the server rejects the plugin as
# "legacy" or warns about api-version, set this to match (run /version in-game).
api-version: '1.21'

# All optional. Vault -> EARN balance; Essentials -> SETHOME (home set);
# Lands -> CLAIM (land owned); Rankup -> RANKUP (live PlayerRankupEvent);
# LuckPerms -> RANKUP (join-time "past starting rank" check). Each task falls
# back to command detection if its plugin/hook is unavailable.
softdepend: [Vault, Essentials, Lands, Rankup, LuckPerms]

commands:
  starter:
    description: Open your Starter Guide book.
    usage: /starter [reset [player]]
    aliases: [guide]

permissions:
  theatria.onboarding.use:
    description: Open the Starter Guide.
    default: true
  theatria.onboarding.admin:
    description: Reset onboarding progress.
    default: op
